<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="description" content="EatText — e-reader arcade que come notícias linha por linha.">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EatText">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <title>EatText</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Screen: Settings -->
  <div id="screen-settings" class="screen" aria-modal="true" role="dialog" aria-labelledby="settings-title">
    <header class="settings-header">
      <button id="btn-settings-close" class="icon-btn" aria-label="Fechar configurações">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <h2 id="settings-title" class="settings-title">Configurações</h2>
    </header>

    <div class="settings-body">

      <div class="setting-group">
        <label for="slider-speed" class="setting-label">
          Velocidade
          <span id="speed-value" class="setting-value">4</span>
        </label>
        <input type="range" id="slider-speed" class="slider" min="1" max="10" value="4" step="1" aria-label="Velocidade de scroll">
      </div>

      <div class="setting-group">
        <label for="slider-font-size" class="setting-label">
          Tamanho da fonte
          <span id="font-size-value" class="setting-value">48px</span>
        </label>
        <input type="range" id="slider-font-size" class="slider" min="24" max="96" value="48" step="2" aria-label="Tamanho da fonte">
      </div>

      <div class="setting-group">
        <span class="setting-label">Tema</span>
        <div class="toggle-group" role="group" aria-label="Tema">
          <button class="toggle-btn active" data-theme="dark" aria-pressed="false">Escuro</button>
          <button class="toggle-btn" data-theme="light" aria-pressed="false">Claro</button>
          <button class="toggle-btn" data-theme="auto" aria-pressed="true">Auto</button>
        </div>
      </div>

      <div class="setting-group">
        <span class="setting-label">Efeito de scroll</span>
        <div class="toggle-group" role="group" aria-label="Efeito de scroll">
          <button class="toggle-btn active" data-scroll-effect="linear" aria-pressed="true">Linear</button>
          <button class="toggle-btn" data-scroll-effect="fisheye" aria-pressed="false">Fisheye</button>
        </div>
      </div>

      <div class="setting-group row">
        <label class="setting-label" for="toggle-mirror">Modo espelho</label>
        <button id="toggle-mirror" class="switch" role="switch" aria-checked="false" aria-label="Modo espelho">
          <span class="switch-thumb"></span>
        </button>
      </div>

      <div class="setting-group row">
        <label class="setting-label" for="toggle-progress">Indicador de progresso</label>
        <button id="toggle-progress" class="switch" role="switch" aria-checked="false" aria-label="Indicador de progresso">
          <span class="switch-thumb"></span>
        </button>
      </div>

      <div class="setting-group row">
        <label class="setting-label" for="toggle-yolo">Modo Yolo 🔥</label>
        <button id="toggle-yolo" class="switch" role="switch" aria-checked="false" aria-label="Modo Yolo — avançar artigos automaticamente">
          <span class="switch-thumb"></span>
        </button>
      </div>

    </div>
  </div>

  <!-- Screen: Reader -->
  <div id="screen-prompter" class="screen">
    <!-- Arcade marquee -->
    <div class="arcade-marquee">
      <button id="btn-settings" class="icon-btn arcade-settings-btn" aria-label="Configurações">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <span class="arcade-marquee-title">◄ EAT TEXT ►</span>
      <div class="arcade-lives" id="arcade-lives">
        <span class="arcade-life" data-life="1">ᗤ</span>
        <span class="arcade-life" data-life="2">ᗤ</span>
        <span class="arcade-life" data-life="3">ᗤ</span>
      </div>
    </div>

    <!-- Arcade scoreboard -->
    <div class="arcade-scoreboard" aria-hidden="true">
      <div class="arcade-score-block">
        <div class="arcade-score-label">1UP</div>
        <div class="arcade-score-val" id="arcade-score-1up">00000</div>
      </div>
      <div class="arcade-score-block">
        <div class="arcade-score-label">HI-SCORE</div>
        <div class="arcade-score-val arcade-hiscore" id="arcade-score-hi">00000</div>
      </div>
      <div class="arcade-score-block">
        <div class="arcade-score-label">WORDS</div>
        <div class="arcade-score-val" id="arcade-score-words">00000</div>
      </div>
    </div>

    <!-- Reader body: image card + canvas stacked, flexbox -->
    <div class="reader-body">
      <a id="article-card" class="article-card" href="#" target="_blank" rel="noopener" hidden>
        <img class="article-card-img" src="" alt="">
        <span class="article-card-link">↗ ler artigo</span>
      </a>
      <canvas id="prompter-canvas" aria-label="Leitor de artigos" role="img"></canvas>
    </div>

    <div id="progress-bar" class="progress-bar" aria-hidden="true"></div>

    <!-- Read Over overlay -->
    <div id="arcade-gameover" class="arcade-gameover" hidden>
      <div class="arcade-gameover-card">
        <p class="arcade-gameover-label">READ OVER</p>
        <p id="arcade-gameover-count" class="arcade-gameover-count">1 / 1</p>
        <div class="arcade-gameover-actions">
          <button id="btn-next-article" class="arcade-gameover-btn ago-next">NEXT →</button>
          <button id="btn-game-over"    class="arcade-gameover-btn ago-exit">GAME OVER</button>
        </div>
      </div>
    </div>

    <div id="arcade-hud" class="arcade-hud" aria-hidden="true">

      <div class="ahud-wpm">
        <span id="ahud-wpm-val" class="ahud-wpm-val">280</span>
        <span class="ahud-lbl">WPM</span>
      </div>

      <div class="ahud-speed">
        <div class="ahud-pips" id="ahud-pips">
          <div class="ahud-pip" data-pip="1"></div>
          <div class="ahud-pip" data-pip="2"></div>
          <div class="ahud-pip" data-pip="3"></div>
          <div class="ahud-pip" data-pip="4"></div>
          <div class="ahud-pip" data-pip="5"></div>
          <div class="ahud-pip" data-pip="6"></div>
          <div class="ahud-pip" data-pip="7"></div>
          <div class="ahud-pip" data-pip="8"></div>
          <div class="ahud-pip" data-pip="9"></div>
          <div class="ahud-pip" data-pip="10"></div>
        </div>
        <span class="ahud-lbl">SPEED</span>
      </div>

      <div class="ahud-font">
        <span id="ahud-font-val" class="ahud-font-val">Aa 48</span>
        <span class="ahud-lbl">FONT</span>
      </div>

    </div>
  </div>

  <script type="module" src="/app.js"></script>
  <script type="module" src="/arcade.js"></script>
</body>
</html>
