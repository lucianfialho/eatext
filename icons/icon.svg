<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0a0a0a"/>

  <!-- Body (Pac-Man style, mouth open ~45deg) -->
  <path d="M256 100
    A156 156 0 1 1 366 311
    L256 256 Z"
    fill="#f5c518"/>

  <!-- Upper teeth -->
  <rect x="246" y="190" width="32" height="22" rx="4" fill="#fff"/>
  <rect x="288" y="190" width="32" height="22" rx="4" fill="#fff"/>

  <!-- Eye -->
  <circle cx="292" cy="148" r="20" fill="#1a1a1a"/>
  <circle cx="299" cy="141" r="7" fill="rgba(255,255,255,0.75)"/>

  <!-- Text lines being eaten (coming from right side of mouth) -->
  <rect x="310" y="242" width="130" height="12" rx="6" fill="rgba(255,255,255,0.5)"/>
  <rect x="310" y="266" width="100" height="12" rx="6" fill="rgba(255,255,255,0.35)"/>
  <rect x="310" y="290" width="115" height="12" rx="6" fill="rgba(255,255,255,0.2)"/>
</svg>
