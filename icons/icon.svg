  >C</text>
  <!-- Horizontal lines suggesting text lines -->
  <rect x="168" y="380" width="176" height="12" rx="6" fill="rgba(255,255,255,0.3)"/>
  <rect x="196" y="402" width="120" height="10" rx="5" fill="rgba(255,255,255,0.2)"/>
</svg>
